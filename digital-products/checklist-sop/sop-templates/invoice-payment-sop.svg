<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 1100">
  <!-- Background -->
  <rect width="850" height="1100" fill="#FAFAFA"/>
  
  <!-- Header -->
  <rect x="0" y="0" width="850" height="100" fill="#2D3436"/>
  <text x="425" y="35" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#FFFFFF" text-anchor="middle">📋 SOP TEMPLATES</text>
  <text x="425" y="65" font-family="Arial, sans-serif" font-size="20" fill="#B2BEC3" text-anchor="middle">Invoice & Payment SOP</text>
  
  <!-- Section 1: Payment Terms -->
  <g font-family="Arial, sans-serif">
    <rect x="50" y="120" width="750" height="250" fill="#FFFFFF" stroke="#E0E0E0" rx="15"/>
    <rect x="50" y="120" width="750" height="50" fill="#74B9FF" rx="15"/>
    <rect x="50" y="145" width="750" height="25" fill="#74B9FF"/>
    <text x="70" y="152" font-size="18" font-weight="bold" fill="#FFFFFF">💰 PAYMENT STRUCTURE</text>
    
    <text x="70" y="195" font-size="14" font-weight="bold" fill="#2D3436">Standard Payment Terms</text>
    <rect x="70" y="210" width="700" height="50" fill="#F8F6F4" rx="5"/>
    <text x="90" y="235" font-size="12" fill="#636E72">☐ 50% upfront deposit | 50% upon completion</text>
    <text x="90" y="252" font-size="12" fill="#636E72">☐ 100% upfront (for projects under $XXX)</text>
    <text x="90" y="269" font-size="12" fill="#636E72">☐ Milestone-based payments</text>
    
    <text x="70" y="305" font-size="14" font-weight="bold" fill="#2D3436">Payment Methods</text>
    <text x="70" y="330" font-size="12" fill="#636E72">☐ Bank Transfer: _______________</text>
    <text x="70" y="350" font-size="12" fill="#636E72">☐ PayPal: _______________</text>
    <text x="400" y="330" font-size="12" fill="#636E72">☐ Wise: _______________</text>
  </g>
  
  <!-- Section 2: Invoice Checklist -->
  <g font-family="Arial, sans-serif">
    <rect x="50" y="385" width="750" height="300" fill="#FFFFFF" stroke="#E0E0E0" rx="15"/>
    <rect x="50" y="385" width="750" height="50" fill="#A29BFE" rx="15"/>
    <rect x="50" y="410" width="750" height="25" fill="#A29BFE"/>
    <text x="70" y="417" font-size="18" font-weight="bold" fill="#FFFFFF">📝 INVOICE CHECKLIST</text>
    
    <rect x="70" y="455" width="30" height="30" fill="#FFFFFF" stroke="#00B894" stroke-width="2" rx="3"/>
    <text x="110" y="475" font-size="14" fill="#2D3436">Invoice number (format: INV-YYYY-XXX)</text>
    
    <rect x="70" y="495" width="30" height="30" fill="#FFFFFF" stroke="#00B894" stroke-width="2" rx="3"/>
    <text x="110" y="515" font-size="14" fill="#2D3436">Client name & contact details</text>
    
    <rect x="70" y="535" width="30" height="30" fill="#FFFFFF" stroke="#00B894" stroke-width="2" rx="3"/>
    <text x="110" y="555" font-size="14" fill="#2D3436">Project description & deliverables</text>
    
    <rect x="70" y="575" width="30" height="30" fill="#FFFFFF" stroke="#00B894" stroke-width="2" rx="3"/>
    <text x="110" y="595" font-size="14" fill="#2D3436">Itemized breakdown of costs</text>
    
    <rect x="70" y="615" width="30" height="30" fill="#FFFFFF" stroke="#00B894" stroke-width="2" rx="3"/>
    <text x="110" y="635" font-size="14" fill="#2D3436">Payment due date & late fee policy</text>
  </g>
  
  <!-- Section 3: Follow-up Process -->
  <g font-family="Arial, sans-serif">
    <rect x="50" y="700" width="750" height="250" fill="#FFFFFF" stroke="#E0E0E0" rx="15"/>
    <rect x="50" y="700" width="750" height="50" fill="#FDCB6E" rx="15"/>
    <rect x="50" y="725" width="750" height="25" fill="#FDCB6E"/>
    <text x="70" y="732" font-size="18" font-weight="bold" fill="#2D3436">🔔 PAYMENT FOLLOW-UP SCHEDULE</text>
    
    <text x="70" y="780" font-size="14" font-weight="bold" fill="#2D3436">Day 0:</text>
    <text x="130" y="780" font-size="12" fill="#636E72">Send invoice with project delivery</text>
    
    <text x="70" y="810" font-size="14" font-weight="bold" fill="#2D3436">Day 7:</text>
    <text x="130" y="810" font-size="12" fill="#636E72">Gentle reminder if unpaid</text>
    
    <text x="70" y="840" font-size="14" font-weight="bold" fill="#2D3436">Day 14:</text>
    <text x="130" y="840" font-size="12" fill="#636E72">Second reminder (firm)</text>
    
    <text x="70" y="870" font-size="14" font-weight="bold" fill="#2D3436">Day 30:</text>
    <text x="130" y="870" font-size="12" fill="#636E72">Final notice & late fee applied</text>
    
    <text x="70" y="900" font-size="14" font-weight="bold" fill="#E17055">Day 60+:</text>
    <text x="160" y="900" font-size="12" fill="#E17055">Consider collection action</text>
  </g>
  
  <!-- Footer -->
  <text x="425" y="1050" font-family="Arial, sans-serif" font-size="12" fill="#B2BEC3" text-anchor="middle">Freelancer Success Kit | Invoice & Payment SOP</text>
</svg>
