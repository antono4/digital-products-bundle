<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 1100">
  <!-- Background -->
  <rect width="850" height="1100" fill="#FAFAFA"/>
  
  <!-- Header -->
  <rect x="0" y="0" width="850" height="100" fill="#2D3436"/>
  <text x="425" y="35" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#FFFFFF" text-anchor="middle">✅ FREELANCER SUCCESS KIT</text>
  <text x="425" y="65" font-family="Arial, sans-serif" font-size="20" fill="#B2BEC3" text-anchor="middle">Delivery Checklist</text>
  
  <!-- Progress Bar -->
  <rect x="50" y="115" width="750" height="30" fill="#E0E0E0" rx="15"/>
  <rect x="50" y="115" width="600" height="30" fill="#00B894" rx="15"/>
  <text x="425" y="135" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF" text-anchor="middle">Step 4 of 5</text>
  
  <!-- Section 1: Quality Check -->
  <g font-family="Arial, sans-serif">
    <rect x="50" y="160" width="750" height="300" fill="#FFFFFF" stroke="#E0E0E0" rx="15"/>
    <rect x="50" y="160" width="750" height="50" fill="#00B894" rx="15"/>
    <rect x="50" y="185" width="750" height="25" fill="#00B894"/>
    <text x="70" y="192" font-size="18" font-weight="bold" fill="#FFFFFF">🔍 QUALITY ASSURANCE CHECK</text>
    
    <rect x="70" y="225" width="30" height="30" fill="#00B894" rx="3"/>
    <text x="110" y="245" font-size="14" fill="#2D3436">All deliverables match project scope</text>
    
    <rect x="70" y="265" width="30" height="30" fill="#FFFFFF" stroke="#00B894" stroke-width="2" rx="3"/>
    <text x="110" y="285" font-size="14" fill="#2D3436">Proofread/checked for errors</text>
    
    <rect x="70" y="305" width="30" height="30" fill="#FFFFFF" stroke="#00B894" stroke-width="2" rx="3"/>
    <text x="110" y="325" font-size="14" fill="#2D3436">All links/buttons are functional</text>
    
    <rect x="70" y="345" width="30" height="30" fill="#FFFFFF" stroke="#00B894" stroke-width="2" rx="3"/>
    <text x="110" y="365" font-size="14" fill="#2D3436">Files are properly named & organized</text>
    
    <rect x="70" y="385" width="30" height="30" fill="#FFFFFF" stroke="#00B894" stroke-width="2" rx="3"/>
    <text x="110" y="405" font-size="14" fill="#2D3436">Preview/approvals sent internally</text>
  </g>
  
  <!-- Section 2: File Preparation -->
  <g font-family="Arial, sans-serif">
    <rect x="50" y="475" width="750" height="220" fill="#FFFFFF" stroke="#E0E0E0" rx="15"/>
    <rect x="50" y="475" width="750" height="50" fill="#74B9FF" rx="15"/>
    <rect x="50" y="500" width="750" height="25" fill="#74B9FF"/>
    <text x="70" y="507" font-size="18" font-weight="bold" fill="#FFFFFF">📁 FILE PREPARATION</text>
    
    <rect x="70" y="540" width="30" height="30" fill="#FFFFFF" stroke="#00B894" stroke-width="2" rx="3"/>
    <text x="110" y="560" font-size="14" fill="#2D3436">All files exported in correct formats</text>
    
    <rect x="70" y="580" width="30" height="30" fill="#FFFFFF" stroke="#00B894" stroke-width="2" rx="3"/>
    <text x="110" y="600" font-size="14" fill="#2D3436">Source files included (if agreed)</text>
    
    <rect x="70" y="620" width="30" height="30" fill="#FFFFFF" stroke="#00B894" stroke-width="2" rx="3"/>
    <text x="110" y="640" font-size="14" fill="#2D3436">README/usage guide prepared</text>
  </g>
  
  <!-- Section 3: Delivery -->
  <g font-family="Arial, sans-serif">
    <rect x="50" y="710" width="750" height="200" fill="#FFFFFF" stroke="#E0E0E0" rx="15"/>
    <rect x="50" y="710" width="750" height="50" fill="#A29BFE" rx="15"/>
    <rect x="50" y="735" width="750" height="25" fill="#A29BFE"/>
    <text x="70" y="742" font-size="18" font-weight="bold" fill="#FFFFFF">📧 DELIVERY PACKAGE</text>
    
    <rect x="70" y="775" width="30" height="30" fill="#FFFFFF" stroke="#00B894" stroke-width="2" rx="3"/>
    <text x="110" y="795" font-size="14" fill="#2D3436">Delivery email drafted with clear instructions</text>
    
    <rect x="70" y="815" width="30" height="30" fill="#FFFFFF" stroke="#00B894" stroke-width="2" rx="3"/>
    <text x="110" y="835" font-size="14" fill="#2D3436">Feedback/revision request form attached</text>
    
    <rect x="70" y="855" width="30" height="30" fill="#FFFFFF" stroke="#00B894" stroke-width="2" rx="3"/>
    <text x="110" y="875" font-size="14" fill="#2D3436">Invoice sent (if payment on delivery)</text>
  </g>
  
  <!-- Completion Box -->
  <rect x="50" y="925" width="750" height="80" fill="#FDCB6E" rx="10"/>
  <text x="425" y="965" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#2D3436" text-anchor="middle">🎉 Ready for Delivery!</text>
  <text x="425" y="990" font-family="Arial, sans-serif" font-size="14" fill="#636E72" text-anchor="middle">Project: _________________________ | Date Delivered: ____________</text>
  
  <!-- Footer -->
  <text x="425" y="1050" font-family="Arial, sans-serif" font-size="12" fill="#B2BEC3" text-anchor="middle">Freelancer Success Kit | Delivery Checklist</text>
</svg>
