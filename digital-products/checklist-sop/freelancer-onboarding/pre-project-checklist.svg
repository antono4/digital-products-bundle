<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 1100">
  <!-- Background -->
  <rect width="850" height="1100" fill="#FAFAFA"/>
  
  <!-- Header -->
  <rect x="0" y="0" width="850" height="100" fill="#2D3436"/>
  <text x="425" y="35" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#FFFFFF" text-anchor="middle">✅ FREELANCER SUCCESS KIT</text>
  <text x="425" y="65" font-family="Arial, sans-serif" font-size="20" fill="#B2BEC3" text-anchor="middle">Pre-Project Checklist</text>
  
  <!-- Progress Bar -->
  <rect x="50" y="115" width="750" height="30" fill="#E0E0E0" rx="15"/>
  <rect x="50" y="115" width="200" height="30" fill="#00B894" rx="15"/>
  <text x="425" y="135" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF" text-anchor="middle">Step 1 of 5</text>
  
  <!-- Section 1: Scope Confirmation -->
  <g font-family="Arial, sans-serif">
    <rect x="50" y="160" width="750" height="280" fill="#FFFFFF" stroke="#E0E0E0" rx="15"/>
    <rect x="50" y="160" width="750" height="50" fill="#74B9FF" rx="15"/>
    <rect x="50" y="185" width="750" height="25" fill="#74B9FF"/>
    <text x="70" y="192" font-size="18" font-weight="bold" fill="#FFFFFF">📋 PROJECT SCOPE CONFIRMATION</text>
    
    <rect x="70" y="225" width="30" height="30" fill="#FFFFFF" stroke="#00B894" stroke-width="2" rx="3"/>
    <text x="110" y="245" font-size="14" fill="#2D3436">Scope & deliverables are clearly defined</text>
    
    <rect x="70" y="265" width="30" height="30" fill="#FFFFFF" stroke="#00B894" stroke-width="2" rx="3"/>
    <text x="110" y="285" font-size="14" fill="#2D3436">Timeline & milestones agreed upon</text>
    
    <rect x="70" y="305" width="30" height="30" fill="#FFFFFF" stroke="#00B894" stroke-width="2" rx="3"/>
    <text x="110" y="325" font-size="14" fill="#2D3436">Revisions included specified (usually 2-3 rounds)</text>
    
    <rect x="70" y="345" width="30" height="30" fill="#FFFFFF" stroke="#00B894" stroke-width="2" rx="3"/>
    <text x="110" y="365" font-size="14" fill="#2D3436">Payment terms discussed & agreed</text>
    
    <rect x="70" y="385" width="30" height="30" fill="#FFFFFF" stroke="#00B894" stroke-width="2" rx="3"/>
    <text x="110" y="405" font-size="14" fill="#2D3436">Communication channel established</text>
  </g>
  
  <!-- Section 2: Contract -->
  <g font-family="Arial, sans-serif">
    <rect x="50" y="455" width="750" height="200" fill="#FFFFFF" stroke="#E0E0E0" rx="15"/>
    <rect x="50" y="455" width="750" height="50" fill="#A29BFE" rx="15"/>
    <rect x="50" y="480" width="750" height="25" fill="#A29BFE"/>
    <text x="70" y="487" font-size="18" font-weight="bold" fill="#FFFFFF">📄 CONTRACT PREPARED</text>
    
    <rect x="70" y="520" width="30" height="30" fill="#00B894" rx="3"/>
    <text x="110" y="540" font-size="14" fill="#2D3436">Contract/agreement drafted</text>
    
    <rect x="70" y="560" width="30" height="30" fill="#FFFFFF" stroke="#00B894" stroke-width="2" rx="3"/>
    <text x="110" y="580" font-size="14" fill="#2D3436">Payment schedule specified</text>
    
    <rect x="70" y="600" width="30" height="30" fill="#FFFFFF" stroke="#00B894" stroke-width="2" rx="3"/>
    <text x="110" y="620" font-size="14" fill="#2D3436">NDA signed (if required)</text>
  </g>
  
  <!-- Section 3: Resources -->
  <g font-family="Arial, sans-serif">
    <rect x="50" y="670" width="750" height="200" fill="#FFFFFF" stroke="#E0E0E0" rx="15"/>
    <rect x="50" y="670" width="750" height="50" fill="#00B894" rx="15"/>
    <rect x="50" y="695" width="750" height="25" fill="#00B894"/>
    <text x="70" y="702" font-size="18" font-weight="bold" fill="#FFFFFF">📁 RESOURCES & ACCESS</text>
    
    <rect x="70" y="735" width="30" height="30" fill="#FFFFFF" stroke="#00B894" stroke-width="2" rx="3"/>
    <text x="110" y="755" font-size="14" fill="#2D3436">Client brand assets received (logo, fonts, colors)</text>
    
    <rect x="70" y="775" width="30" height="30" fill="#FFFFFF" stroke="#00B894" stroke-width="2" rx="3"/>
    <text x="110" y="795" font-size="14" fill="#2D3436">Access to necessary tools/platforms granted</text>
    
    <rect x="70" y="815" width="30" height="30" fill="#FFFFFF" stroke="#00B894" stroke-width="2" rx="3"/>
    <text x="110" y="835" font-size="14" fill="#2D3436">Reference materials/inspirations shared</text>
  </g>
  
  <!-- Notes Section -->
  <rect x="50" y="885" width="750" height="100" fill="#F8F6F4" stroke="#E0E0E0" rx="10"/>
  <text x="70" y="915" font-family="Arial, sans-serif" font-size="14" fill="#636E72">Notes:</text>
  <rect x="70" y="930" width="700" height="40" fill="#FFFFFF" stroke="#E0E0E0" rx="5"/>
  
  <!-- Footer -->
  <text x="425" y="1030" font-family="Arial, sans-serif" font-size="12" fill="#B2BEC3" text-anchor="middle">Freelancer Success Kit | Pre-Project Checklist</text>
  <text x="425" y="1050" font-family="Arial, sans-serif" font-size="12" fill="#B2BEC3" text-anchor="middle">Project: _________________________ | Date: _____________</text>
</svg>
