<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 1100">
  <!-- Background -->
  <rect width="850" height="1100" fill="#FAFAFA"/>
  
  <!-- Header -->
  <rect x="0" y="0" width="850" height="80" fill="#A29BFE"/>
  <text x="425" y="35" font-family="Arial, sans-serif" font-size="20" fill="#FFFFFF" text-anchor="middle">WEEK 1: CLUTTER AUDIT</text>
  <text x="425" y="60" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#FFFFFF" text-anchor="middle">DAY 1 - Understanding Minimalism</text>
  
  <!-- Daily Habit Box -->
  <rect x="50" y="95" width="750" height="50" fill="#FDCB6E" rx="10"/>
  <text x="70" y="127" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#2D3436">📌 Daily Habit: Read today's lesson and complete the worksheet</text>
  <rect x="700" y="105" width="30" height="30" fill="#FFFFFF" stroke="#E0E0E0" rx="3"/>
  
  <!-- Lesson Content -->
  <g font-family="Arial, sans-serif">
    <text x="70" y="170" font-size="18" font-weight="bold" fill="#2D3436">What is Minimalism?</text>
    
    <text x="70" y="205" font-size="14" fill="#636E72">Minimalism is not about owning less or living with empty rooms.</text>
    <text x="70" y="230" font-size="14" fill="#636E72">It's about keeping only what adds value to your life.</text>
    
    <!-- Key Points -->
    <rect x="50" y="255" width="750" height="180" fill="#FFFFFF" stroke="#A29BFE" stroke-width="2" rx="15"/>
    <text x="70" y="285" font-size="16" font-weight="bold" fill="#2D3436">🎯 The Core Principles of Minimalism</text>
    
    <text x="90" y="320" font-size="14" fill="#2D3436">1. <tspan font-weight="bold">Intentionality</tspan> - Be deliberate about what you allow into your life</text>
    <text x="90" y="350" font-size="14" fill="#2D3436">2. <tspan font-weight="bold">Value-driven</tspan> - Keep things that serve a purpose or bring joy</text>
    <text x="90" y="380" font-size="14" fill="#2D3436">3. <tspan font-weight="bold">Less is more</tspan> - Fewer choices = more clarity</text>
    <text x="90" y="410" font-size="14" fill="#2D3436">4. <tspan font-weight="bold">Quality over quantity</tspan> - Invest in fewer, better things</text>
    
    <!-- Worksheet -->
    <rect x="50" y="455" width="750" height="300" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="2" rx="15"/>
    <text x="70" y="485" font-size="18" font-weight="bold" fill="#2D3436">📝 WORKSHEET: My Minimalism Inventory</text>
    
    <text x="70" y="520" font-size="14" fill="#636E72">Question 1: What does "minimalism" mean to you?</text>
    <rect x="70" y="535" width="700" height="50" fill="#F8F6F4" rx="5"/>
    
    <text x="70" y="610" font-size="14" fill="#636E72">Question 2: What areas of your life feel cluttered or overwhelming?</text>
    <rect x="70" y="625" width="700" height="50" fill="#F8F6F4" rx="5"/>
    
    <text x="70" y="700" font-size="14" fill="#636E72">Question 3: What is one item you own that you can let go of today?</text>
    <rect x="70" y="715" width="700" height="40" fill="#F8F6F4" rx="5"/>
    
    <!-- Reflection Box -->
    <rect x="50" y="775" width="750" height="150" fill="#A29BFE" opacity="0.1" rx="15"/>
    <text x="70" y="805" font-size="16" font-weight="bold" fill="#2D3436">💭 Daily Reflection</text>
    <text x="70" y="835" font-size="14" fill="#636E72">How do you feel after learning about minimalism?</text>
    <rect x="70" y="850" width="700" height="60" fill="#FFFFFF" rx="5"/>
    
    <!-- Completion -->
    <rect x="50" y="945" width="750" height="60" fill="#00B894" rx="10"/>
    <text x="425" y="975" font-size="16" font-weight="bold" fill="#FFFFFF" text-anchor="middle">✅ I completed Day 1!</text>
    <text x="425" y="995" font-size="12" fill="#FFFFFF" text-anchor="middle">Sign: _______________ Date: _______________</text>
    
    <!-- Page Number -->
    <text x="425" y="1050" font-family="Arial, sans-serif" font-size="14" fill="#B2BEC3" text-anchor="middle">6</text>
  </g>
</svg>
