<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 1100">
  <!-- Background -->
  <rect width="850" height="1100" fill="#FAFAFA"/>
  
  <!-- Header -->
  <rect x="0" y="0" width="850" height="100" fill="#00B894"/>
  <text x="425" y="60" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#FFFFFF" text-anchor="middle">WEEKLY MEAL PLANNER</text>
  <text x="425" y="85" font-family="Arial, sans-serif" font-size="16" fill="#E0E0E0" text-anchor="middle">Plan your meals, save money, eat healthy!</text>
  
  <!-- Days Grid -->
  <g font-family="Arial, sans-serif">
    <!-- Header Row -->
    <rect x="50" y="120" width="750" height="40" fill="#F8F6F4"/>
    <text x="175" y="147" font-size="14" font-weight="bold" fill="#2D3436" text-anchor="middle">DAY</text>
    <text x="320" y="147" font-size="14" font-weight="bold" fill="#2D3436" text-anchor="middle">BREAKFAST</text>
    <text x="465" y="147" font-size="14" font-weight="bold" fill="#2D3436" text-anchor="middle">LUNCH</text>
    <text x="610" y="147" font-size="14" font-weight="bold" fill="#2D3436" text-anchor="middle">DINNER</text>
    <text x="725" y="147" font-size="14" font-weight="bold" fill="#2D3436" text-anchor="middle">SNACKS</text>
    
    <!-- Monday -->
    <rect x="50" y="160" width="750" height="100" fill="#FFFFFF" stroke="#E0E0E0"/>
    <rect x="50" y="160" width="100" height="100" fill="#D4A574"/>
    <text x="100" y="215" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle">MON</text>
    <rect x="150" y="170" width="170" height="80" fill="#F8F6F4" rx="5"/>
    <rect x="295" y="170" width="170" height="80" fill="#F8F6F4" rx="5"/>
    <rect x="440" y="170" width="170" height="80" fill="#F8F6F4" rx="5"/>
    <rect x="585" y="170" width="170" height="80" fill="#F8F6F4" rx="5"/>
    
    <!-- Tuesday -->
    <rect x="50" y="260" width="750" height="100" fill="#FFFFFF" stroke="#E0E0E0"/>
    <rect x="50" y="260" width="100" height="100" fill="#74B9FF"/>
    <text x="100" y="315" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle">TUE</text>
    <rect x="150" y="270" width="170" height="80" fill="#F8F6F4" rx="5"/>
    <rect x="295" y="270" width="170" height="80" fill="#F8F6F4" rx="5"/>
    <rect x="440" y="270" width="170" height="80" fill="#F8F6F4" rx="5"/>
    <rect x="585" y="270" width="170" height="80" fill="#F8F6F4" rx="5"/>
    
    <!-- Wednesday -->
    <rect x="50" y="360" width="750" height="100" fill="#FFFFFF" stroke="#E0E0E0"/>
    <rect x="50" y="360" width="100" height="100" fill="#00B894"/>
    <text x="100" y="415" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle">WED</text>
    <rect x="150" y="370" width="170" height="80" fill="#F8F6F4" rx="5"/>
    <rect x="295" y="370" width="170" height="80" fill="#F8F6F4" rx="5"/>
    <rect x="440" y="370" width="170" height="80" fill="#F8F6F4" rx="5"/>
    <rect x="585" y="370" width="170" height="80" fill="#F8F6F4" rx="5"/>
    
    <!-- Thursday -->
    <rect x="50" y="460" width="750" height="100" fill="#FFFFFF" stroke="#E0E0E0"/>
    <rect x="50" y="460" width="100" height="100" fill="#A29BFE"/>
    <text x="100" y="515" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle">THU</text>
    <rect x="150" y="470" width="170" height="80" fill="#F8F6F4" rx="5"/>
    <rect x="295" y="470" width="170" height="80" fill="#F8F6F4" rx="5"/>
    <rect x="440" y="470" width="170" height="80" fill="#F8F6F4" rx="5"/>
    <rect x="585" y="470" width="170" height="80" fill="#F8F6F4" rx="5"/>
    
    <!-- Friday -->
    <rect x="50" y="560" width="750" height="100" fill="#FFFFFF" stroke="#E0E0E0"/>
    <rect x="50" y="560" width="100" height="100" fill="#E17055"/>
    <text x="100" y="615" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle">FRI</text>
    <rect x="150" y="570" width="170" height="80" fill="#F8F6F4" rx="5"/>
    <rect x="295" y="570" width="170" height="80" fill="#F8F6F4" rx="5"/>
    <rect x="440" y="570" width="170" height="80" fill="#F8F6F4" rx="5"/>
    <rect x="585" y="570" width="170" height="80" fill="#F8F6F4" rx="5"/>
    
    <!-- Saturday -->
    <rect x="50" y="660" width="750" height="100" fill="#FFFFFF" stroke="#E0E0E0"/>
    <rect x="50" y="660" width="100" height="100" fill="#FDCB6E"/>
    <text x="100" y="715" font-size="14" font-weight="bold" fill="#2D3436" text-anchor="middle">SAT</text>
    <rect x="150" y="670" width="170" height="80" fill="#F8F6F4" rx="5"/>
    <rect x="295" y="670" width="170" height="80" fill="#F8F6F4" rx="5"/>
    <rect x="440" y="670" width="170" height="80" fill="#F8F6F4" rx="5"/>
    <rect x="585" y="670" width="170" height="80" fill="#F8F6F4" rx="5"/>
    
    <!-- Sunday -->
    <rect x="50" y="760" width="750" height="100" fill="#FFFFFF" stroke="#E0E0E0"/>
    <rect x="50" y="760" width="100" height="100" fill="#636E72"/>
    <text x="100" y="815" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle">SUN</text>
    <rect x="150" y="770" width="170" height="80" fill="#F8F6F4" rx="5"/>
    <rect x="295" y="770" width="170" height="80" fill="#F8F6F4" rx="5"/>
    <rect x="440" y="770" width="170" height="80" fill="#F8F6F4" rx="5"/>
    <rect x="585" y="770" width="170" height="80" fill="#F8F6F4" rx="5"/>
  </g>
  
  <!-- Water Tracker -->
  <rect x="50" y="880" width="750" height="200" fill="#FFFFFF" stroke="#74B9FF" stroke-width="2" rx="15"/>
  <text x="425" y="915" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#2D3436" text-anchor="middle">💧 WATER INTAKE TRACKER</text>
  <text x="425" y="940" font-family="Arial, sans-serif" font-size="14" fill="#636E72" text-anchor="middle">Target: 8 glasses per day</text>
  
  <g>
    <rect x="80" y="960" width="50" height="70" fill="#74B9FF" opacity="0.3" rx="5"/>
    <rect x="150" y="960" width="50" height="70" fill="#74B9FF" opacity="0.3" rx="5"/>
    <rect x="220" y="960" width="50" height="70" fill="#74B9FF" opacity="0.3" rx="5"/>
    <rect x="290" y="960" width="50" height="70" fill="#74B9FF" opacity="0.3" rx="5"/>
    <rect x="360" y="960" width="50" height="70" fill="#74B9FF" opacity="0.3" rx="5"/>
    <rect x="430" y="960" width="50" height="70" fill="#74B9FF" opacity="0.3" rx="5"/>
    <rect x="500" y="960" width="50" height="70" fill="#74B9FF" opacity="0.3" rx="5"/>
    <rect x="570" y="960" width="50" height="70" fill="#74B9FF" opacity="0.3" rx="5"/>
    <text x="105" y="1045" font-family="Arial, sans-serif" font-size="12" fill="#74B9FF" text-anchor="middle">1</text>
    <text x="175" y="1045" font-family="Arial, sans-serif" font-size="12" fill="#74B9FF" text-anchor="middle">2</text>
    <text x="245" y="1045" font-family="Arial, sans-serif" font-size="12" fill="#74B9FF" text-anchor="middle">3</text>
    <text x="315" y="1045" font-family="Arial, sans-serif" font-size="12" fill="#74B9FF" text-anchor="middle">4</text>
    <text x="385" y="1045" font-family="Arial, sans-serif" font-size="12" fill="#74B9FF" text-anchor="middle">5</text>
    <text x="455" y="1045" font-family="Arial, sans-serif" font-size="12" fill="#74B9FF" text-anchor="middle">6</text>
    <text x="525" y="1045" font-family="Arial, sans-serif" font-size="12" fill="#74B9FF" text-anchor="middle">7</text>
    <text x="595" y="1045" font-family="Arial, sans-serif" font-size="12" fill="#74B9FF" text-anchor="middle">8</text>
  </g>
</svg>
