<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 1100">
  <!-- Background -->
  <rect width="850" height="1100" fill="#00B894"/>
  
  <!-- Decorative Elements -->
  <circle cx="100" cy="200" r="150" fill="#FFFFFF" opacity="0.1"/>
  <circle cx="750" cy="900" r="200" fill="#FFFFFF" opacity="0.1"/>
  <circle cx="700" cy="300" r="100" fill="#FFFFFF" opacity="0.1"/>
  
  <!-- Content Card -->
  <rect x="100" y="200" width="650" height="700" fill="#FFFFFF" rx="30"/>
  
  <!-- Header -->
  <text x="425" y="320" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#00B894" text-anchor="middle">WEEKLY</text>
  <text x="425" y="380" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#00B894" text-anchor="middle">MEAL</text>
  <text x="425" y="440" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#00B894" text-anchor="middle">PLANNER</text>
  
  <!-- Decorative Line -->
  <rect x="300" y="480" width="250" height="6" fill="#FDCB6E" rx="3"/>
  
  <!-- Subtitle -->
  <text x="425" y="540" font-family="Arial, sans-serif" font-size="24" fill="#636E72" text-anchor="middle">Plan your meals</text>
  <text x="425" y="580" font-family="Arial, sans-serif" font-size="24" fill="#636E72" text-anchor="middle">Save money</text>
  <text x="425" y="620" font-family="Arial, sans-serif" font-size="24" fill="#636E72" text-anchor="middle">Eat healthy!</text>
  
  <!-- Icons -->
  <g>
    <!-- Fork and Knife -->
    <text x="250" y="720" font-size="60" text-anchor="middle">🍽️</text>
    <!-- Leaf -->
    <text x="425" y="720" font-size="60" text-anchor="middle">🥗</text>
    <!-- Heart -->
    <text x="600" y="720" font-size="60" text-anchor="middle">❤️</text>
  </g>
  
  <!-- Year -->
  <text x="425" y="850" font-family="Arial, sans-serif" font-size="28" fill="#B2BEC3" text-anchor="middle">2 0 2 4</text>
</svg>
