<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1500">
  <!-- Background -->
  <rect width="1000" height="1500" fill="#F8F6F4"/>
  
  <!-- Top Decoration -->
  <rect x="0" y="0" width="1000" height="400" fill="#2D3436"/>
  
  <!-- Brand -->
  <text x="500" y="100" font-family="Arial, sans-serif" font-size="32" fill="#FFFFFF" text-anchor="middle">YOUR BRAND</text>
  
  <!-- Main Title -->
  <text x="500" y="500" font-family="Arial, sans-serif" font-size="64" font-weight="bold" fill="#2D3436" text-anchor="middle">PIN TITLE</text>
  <text x="500" y="580" font-family="Arial, sans-serif" font-size="64" font-weight="bold" fill="#2D3436" text-anchor="middle">HERE</text>
  
  <!-- Subtitle -->
  <text x="500" y="700" font-family="Arial, sans-serif" font-size="32" fill="#636E72" text-anchor="middle">Add your compelling</text>
  <text x="500" y="750" font-family="Arial, sans-serif" font-size="32" fill="#636E72" text-anchor="middle">description text</text>
  
  <!-- Accent Line -->
  <rect x="350" y="820" width="300" height="6" fill="#D4A574" rx="3"/>
  
  <!-- CTA -->
  <rect x="300" y="900" width="400" height="80" fill="#2D3436" rx="40"/>
  <text x="500" y="955" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#FFFFFF" text-anchor="middle">SAVE FOR LATER</text>
  
  <!-- Username -->
  <text x="500" y="1100" font-family="Arial, sans-serif" font-size="24" fill="#B2BEC3" text-anchor="middle">@yourusername</text>
</svg>
