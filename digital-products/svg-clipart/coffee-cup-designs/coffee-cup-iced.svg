<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">
  <!-- Iced Coffee Cup with Straw -->
  
  <!-- Cup Body -->
  <path d="M130 150 L130 420 Q135 440 155 440 L345 440 Q365 440 370 420 L370 150 Z" 
        fill="#FFFFFF" stroke="#2D3436" stroke-width="3"/>
  
  <!-- Ice Cubes -->
  <rect x="150" y="200" width="50" height="50" rx="5" fill="#E3F2FD" stroke="#90CAF9" stroke-width="1" transform="rotate(10 175 225)"/>
  <rect x="200" y="210" width="45" height="45" rx="5" fill="#E3F2FD" stroke="#90CAF9" stroke-width="1" transform="rotate(-5 222 232)"/>
  <rect x="250" y="195" width="55" height="55" rx="5" fill="#E3F2FD" stroke="#90CAF9" stroke-width="1" transform="rotate(8 277 222)"/>
  <rect x="300" y="205" width="48" height="48" rx="5" fill="#E3F2FD" stroke="#90CAF9" stroke-width="1" transform="rotate(-10 324 229)"/>
  
  <!-- Coffee Liquid -->
  <rect x="135" y="260" width="230" height="180" fill="#6D4C41"/>
  
  <!-- Straw -->
  <rect x="280" y="50" width="15" height="300" rx="3" fill="#E74C3C"/>
  <rect x="280" y="50" width="15" height="100" fill="#FFFFFF"/>
  
  <!-- Lid -->
  <ellipse cx="250" cy="150" rx="125" ry="25" fill="#2D3436"/>
  <ellipse cx="250" cy="145" rx="115" ry="20" fill="#3D4749"/>
  
  <!-- Dome on Lid -->
  <path d="M150 145 Q250 80 350 145" fill="#2D3436"/>
  
  <!-- Straw Hole -->
  <ellipse cx="290" cy="130" rx="12" ry="6" fill="#2D3436"/>
  
  <!-- Condensation Drops -->
  <circle cx="150" cy="300" r="5" fill="#74B9FF" opacity="0.5"/>
  <circle cx="160" cy="340" r="4" fill="#74B9FF" opacity="0.5"/>
  <circle cx="145" cy="380" r="6" fill="#74B9FF" opacity="0.5"/>
  <circle cx="350" cy="310" r="5" fill="#74B9FF" opacity="0.5"/>
  <circle cx="345" cy="360" r="4" fill="#74B9FF" opacity="0.5"/>
</svg>
