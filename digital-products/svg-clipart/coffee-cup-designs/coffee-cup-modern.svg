<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">
  <!-- Modern Geometric Coffee Cup -->
  
  <!-- Cup Body - Geometric Shape -->
  <polygon points="100,150 400,150 370,400 130,400" 
           fill="#2D3436" stroke="none"/>
  
  <!-- Coffee Fill -->
  <polygon points="110,160 390,160 365,250 135,250" 
           fill="#6D4C41"/>
  
  <!-- Geometric Accent Lines -->
  <line x1="150" y1="280" x2="350" y2="280" stroke="#FFFFFF" stroke-width="2"/>
  <line x1="160" y1="320" x2="340" y2="320" stroke="#FFFFFF" stroke-width="2"/>
  <line x1="170" y1="360" x2="330" y2="360" stroke="#FFFFFF" stroke-width="2"/>
  
  <!-- Abstract Handle -->
  <rect x="390" y="180" width="60" height="100" rx="10" 
        fill="none" stroke="#2D3436" stroke-width="3"/>
  
  <!-- Steam - Abstract Lines -->
  <line x1="200" y1="130" x2="200" y2="80" stroke="#636E72" stroke-width="3" stroke-linecap="round"/>
  <line x1="250" y1="120" x2="250" y2="70" stroke="#636E72" stroke-width="3" stroke-linecap="round"/>
  <line x1="300" y1="130" x2="300" y2="80" stroke="#636E72" stroke-width="3" stroke-linecap="round"/>
</svg>
